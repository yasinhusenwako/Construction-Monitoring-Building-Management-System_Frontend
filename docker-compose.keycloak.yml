services:
  postgres-keycloak:
    image: postgres:15
    container_name: insa-keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_db_password}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    networks:
      - keycloak-network
    ports:
      - "5433:5432" # Different port to avoid conflict with your main DB

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: insa-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_db_password}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_PROXY: edge
      KEYCLOAK_FRONTEND_URL: http://localhost:8090
      KC_LOG_LEVEL: info
      KC_METRICS_ENABLED: true
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev --hostname-strict=false --hostname-port=8090 --hostname-url=http://localhost:8090 --hostname-admin-url=http://localhost:8090
    depends_on:
      - postgres-keycloak
    ports:
      - "8090:8080" # Map external 8090 to internal 8080
    volumes:
      - ./keycloak-theme:/opt/keycloak/themes
    networks:
      - keycloak-network

volumes:
  keycloak_postgres_data:

networks:
  keycloak-network:
    driver: bridge
